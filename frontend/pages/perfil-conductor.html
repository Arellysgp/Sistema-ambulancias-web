<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAMU — Mi Perfil</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background-color: #f8fafc; color: #1e293b; }

    /* ── Navbar ── */
    .navbar-samu {
      background-color: #0f172a;
      border-bottom: 1px solid #1e293b;
      min-height: 60px;
    }
    .navbar-logo {
      color: white; font-weight: 700; display: flex; align-items: center; gap: 8px; font-size: 1.1rem; padding-left: 1.5rem;
    }
    .navbar-logo i { color: #ef4444; font-size: 1.3rem; }
    .navbar-logo .separador {
      margin-left: 10px; border-left: 1px solid rgba(255,255,255,0.15); padding-left: 12px; font-weight: 400; font-size: 0.8em; color: #94a3b8; letter-spacing: 0.02em;
    }
    .navbar-link-premium {
      color: #f8fafc !important; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.03em; background-color: transparent !important;
    }
    .navbar-samu .navbar-item.has-dropdown:hover .navbar-link,
    .navbar-samu .navbar-link:hover {
      background-color: transparent !important;
    }
    .badge-user {
      background-color: #1e293b; padding: 6px 12px; border-radius: 6px; border: 1px solid #334155; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; color: #f8fafc;
    }
    .navbar-item.has-dropdown:hover .badge-user { background-color: #334155; border-color: #475569; }
    
    .navbar-dropdown { 
      background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; 
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); padding: 0.5rem 0;
      /* Animación suave al aparecer */
      opacity: 0; transform: translateY(-10px); display: block !important; visibility: hidden; transition: all 0.3s ease; pointer-events: none;
      margin-top: 0 !important; /* Quitar el margen para no romper el hover */
    }
    .navbar-item.has-dropdown:hover .navbar-dropdown {
      opacity: 1; transform: translateY(0); visibility: visible; pointer-events: auto;
    }
    
    .navbar-dropdown .navbar-item { color: #f8fafc !important; font-size: 0.9rem; transition: all 0.2s; }
    .navbar-dropdown .navbar-item:hover { background-color: #334155 !important; color: #fca5a5 !important; }

    /* ── Cards / Boxes ── */
    .box {
      border-radius: 12px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      border: 1px solid #e2e8f0;
      background-color: #ffffff;
      padding: 1.5rem;
    }

    /* ── Tipografía General ── */
    h1.title { font-size: 1.5rem; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 10px; }
    h2.title { font-size: 1.1rem; font-weight: 600; color: #1e293b; margin-bottom: 1.25rem !important; }
    .subtitle { color: #64748b; font-size: 0.9rem; }

    /* ── Avatar Profile ── */
    .avatar-wrap {
      width: 100px; height: 100px; border-radius: 50%;
      background: #f8fafc; border: 2px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #94a3b8;
      overflow: hidden; cursor: pointer; position: relative; margin: 0 auto;
      transition: all 0.2s;
    }
    .avatar-wrap:hover { border-color: #cbd5e1; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .avatar-wrap img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .avatar-wrap:hover::after {
      content: '📷'; position: absolute; inset: 0;
      background: rgba(0,0,0,.5); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }
    
    .stats-box {
      background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;
    }
    .stats-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 2px; }

    /* ── Forms ── */
    .label {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .input {
      font-size: 0.875rem;
      border-color: #cbd5e1;
      border-radius: 8px;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      transition: all 0.2s;
      background-color: #ffffff;
      color: #334155;
      height: 2.75em;
    }
    .input:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }
    .input[disabled] { background-color: #f1f5f9; color: #94a3b8; border-color: #e2e8f0; }
    
    /* ── Password Toggle ── */
    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 0.9rem;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: #64748b; }
    
    .strength-bar-wrap { height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: .5rem; overflow: hidden; }
    .strength-bar { height: 100%; width: 0; border-radius: 2px; transition: width .3s, background .3s; }

    /* ── Buttons ── */
    .button.is-dark {
      background-color: #1e293b; color: white; border: none; border-radius: 8px;
      font-weight: 500; font-size: 0.875rem; padding: 0.6rem 1.25rem; height: auto;
      box-shadow: 0 4px 6px -1px rgba(30, 41, 59, 0.2); transition: all 0.2s;
    }
    .button.is-dark:hover { background-color: #0f172a; transform: translateY(-1px); color: white; }
    
    .button.is-danger {
      background-color: #dc2626; color: white; border: none; border-radius: 8px;
      font-weight: 500; font-size: 0.875rem; padding: 0.6rem 1.25rem; height: auto;
      box-shadow: 0 4px 6px -1px rgba(220, 38, 38, 0.2); transition: all 0.2s;
    }
    .button.is-danger:hover { background-color: #b91c1c; transform: translateY(-1px); color: white; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 1rem 1.5rem;
      border-radius: 10px; font-size: 0.875rem; font-weight: 500; opacity: 0; transform: translateY(10px);
      transition: all .3s; z-index: 999; pointer-events: none; color: #fff;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 8px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-samu" role="navigation">
  <div class="navbar-brand">
    <a class="navbar-item navbar-logo" href="panel-conductor.html">
      <i class="fa-solid fa-truck-medical"></i> SAMU
      <span class="separador">Sistema de Atención Móvil de Urgencias</span>
    </a>
  </div>
  <div class="navbar-menu" style="background:transparent; box-shadow:none;">
    <div class="navbar-end" style="padding-right: 1.5rem;">
      <div class="navbar-item has-dropdown is-hoverable">
        <a class="navbar-link navbar-link-premium is-arrowless">
          <span class="badge-user">
            <i class="fa-solid fa-user-shield" style="color: #94a3b8;"></i>
            <span id="nav-nombre">Conductor</span>
            <i class="fa-solid fa-chevron-down" style="font-size:0.7em; margin-left:4px; color: #64748b;"></i>
          </span>
        </a>
        <div class="navbar-dropdown is-right">
          <a class="navbar-item" href="panel-conductor.html">
            <i class="fa-solid fa-arrow-left" style="color:#64748b; margin-right:8px;"></i> Volver al panel
          </a>
          <hr class="navbar-divider" style="background-color:#334155;">
          <a class="navbar-item" onclick="mostrarModalLogout()">
            <i class="fa-solid fa-arrow-right-from-bracket" style="color:#ef4444; margin-right:8px;"></i> Cerrar sesión
          </a>
        </div>
      </div>
    </div>
  </div>
</nav>

<section class="section">
  <div class="container">
    <h1 class="title is-4 mb-1">Mi perfil</h1>
    <br>
    
    <p class="subtitle is-6 mb-5">Gestiona tu información personal y foto de perfil</p>

    <div class="columns">

      <!-- Columna izquierda — Avatar -->
      <div class="column is-3">
        <div class="box has-text-centered" style="">
          <div class="avatar-wrap mb-3" id="avatar-preview" onclick="document.getElementById('input-foto').click()">
            <span id="avatar-initials">?</span>
            <img id="avatar-img" src="" alt="" style="display:none"/>
          </div>
          <input type="file" id="input-foto" accept="image/*" style="display:none" onchange="previsualizarFoto(event)"/>
          <p style="font-size:.75rem;color:#3b82f6;font-weight:500;cursor:pointer;text-decoration:underline;"
             onclick="document.getElementById('input-foto').click()">📷 Cambiar foto</p>

          <p class="has-text-weight-bold mt-4" style="color:#0f172a; font-size:1.1rem;" id="av-nombre">—</p>
          <span class="tag is-danger is-light mt-1" id="av-rol">—</span>
          <p class="is-size-7 has-text-grey mt-2" id="av-email">—</p>

          <div class="mt-4">
            <div class="stats-box p-3 mb-2">
              <p class="stats-label">En el sistema desde</p>
              <p class="has-text-weight-bold is-size-7" style="color:#334155" id="av-desde">—</p>
            </div>
            <div class="stats-box p-3">
              <p class="stats-label">Estado de cuenta</p>
              <p class="has-text-weight-bold is-size-7 has-text-success" id="av-estado">—</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Columna derecha — Formularios -->
      <div class="column">

        <!-- Datos personales -->
        <div class="box mb-4">
          <h2 class="title is-5 mb-4">Datos personales</h2>
          <div class="columns">
            <div class="column">
              <div class="field">
                <label class="label is-small">Nombre</label>
                <div class="control">
                  <input class="input" type="text" id="p-nombre" placeholder="Tu nombre"/>
                </div>
              </div>
            </div>
            <div class="column">
              <div class="field">
                <label class="label is-small">Apellido</label>
                <div class="control">
                  <input class="input" type="text" id="p-apellido" placeholder="Tu apellido"/>
                </div>
              </div>
            </div>
          </div>
          <div class="columns">
            <div class="column">
              <div class="field">
                <label class="label is-small">Correo electrónico</label>
                <div class="control">
                  <input class="input" type="email" id="p-email" disabled/>
                </div>
              </div>
            </div>
            <div class="column">
              <div class="field">
                <label class="label is-small">Teléfono</label>
                <div class="control">
                  <input class="input" type="tel" id="p-telefono" placeholder="Ej: 987654321"/>
                </div>
              </div>
            </div>
          </div>
          <div class="field" style="max-width:300px">
            <label class="label is-small">Rol</label>
            <div class="control">
              <input class="input" type="text" id="p-rol" disabled/>
            </div>
          </div>
          <div class="field mt-4">
            <div class="control">
              <button class="button is-dark" onclick="guardarPerfil()">
                <span class="icon"><i class="fa-solid fa-floppy-disk"></i></span>
                <span>Guardar cambios</span>
              </button>
              <span id="fb-perfil" class="ml-3 is-size-7"></span>
            </div>
          </div>
        </div>

        <!-- Cambiar contraseña -->
        <div class="box">
          <h2 class="title is-5 mb-4">Cambiar contraseña</h2>
          <div class="field">
            <label class="label is-small">Contraseña actual</label>
            <div class="control pw-wrap">
              <input class="input" type="password" id="pw-actual" placeholder="••••••••"/>
              <button class="pw-toggle" type="button" onclick="togglePw('pw-actual',this)">👁</button>
            </div>
          </div>
          <div class="columns">
            <div class="column">
              <div class="field">
                <label class="label is-small">Nueva contraseña</label>
                <div class="control pw-wrap">
                  <input class="input" type="password" id="pw-nueva" placeholder="••••••••" oninput="checkStrength(this.value)"/>
                  <button class="pw-toggle" type="button" onclick="togglePw('pw-nueva',this)">👁</button>
                </div>
                <div class="strength-bar-wrap mt-1"><div class="strength-bar" id="strength-bar"></div></div>
                <p class="is-size-7 has-text-grey mt-1" id="strength-text"></p>
              </div>
            </div>
            <div class="column">
              <div class="field">
                <label class="label is-small">Confirmar nueva contraseña</label>
                <div class="control pw-wrap">
                  <input class="input" type="password" id="pw-confirma" placeholder="••••••••"/>
                  <button class="pw-toggle" type="button" onclick="togglePw('pw-confirma',this)">👁</button>
                </div>
              </div>
            </div>
          </div>
          <div class="field mt-2">
            <div class="control">
              <button class="button is-danger" onclick="cambiarPassword()">
                <span class="icon"><i class="fa-solid fa-lock"></i></span>
                <span>Actualizar contraseña</span>
              </button>
              <span id="fb-pw" class="ml-3 is-size-7"></span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
  const API     = 'http://127.0.0.1:5000/api';
  const USER_ID = localStorage.getItem('user_id');
  if (!USER_ID) window.location.href = '../index.html';

  let fotoBase64 = null;

  const nombreGuardado = localStorage.getItem('nombre_usuario') || 'Conductor';
  document.getElementById('nav-nombre').textContent = nombreGuardado;

  function toast(msg, ok=false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.background = ok ? '#27ae60' : '#D0342C';
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function apiFetch(url, opts={}) {
    const headers = { 'X-User-Id': USER_ID, ...(opts.headers || {}) };
    const { headers: _, ...restOpts } = opts;
    return fetch(API + url, { credentials: 'include', headers, ...restOpts });
  }

  function feedback(id, msg, ok=true) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.color = ok ? '#27ae60' : '#D0342C';
    setTimeout(() => el.textContent = '', 4000);
  }

  async function cargarPerfil() {
    try {
      const res = await apiFetch('/perfil');
      if (!res.ok) throw new Error();
      const u = await res.json();
      const nombre = `${u.nombre||''} ${u.apellido||''}`.trim();
      document.getElementById('nav-nombre').textContent = u.nombre || 'Conductor';
      document.getElementById('av-nombre').textContent  = nombre || '—';
      document.getElementById('av-rol').textContent     = rolLabel(u.rol);
      document.getElementById('av-email').textContent   = u.email || '—';
      document.getElementById('av-estado').textContent  = u.activo ? 'Activo ✓' : 'Inactivo';
      document.getElementById('av-desde').textContent   = u.fecha_registro
        ? new Date(u.fecha_registro).toLocaleDateString('es-PE', {month:'long', year:'numeric'})
        : '—';
      document.getElementById('p-nombre').value   = u.nombre || '';
      document.getElementById('p-apellido').value = u.apellido || '';
      document.getElementById('p-email').value    = u.email || '';
      document.getElementById('p-telefono').value = u.telefono || '';
      document.getElementById('p-rol').value      = rolLabel(u.rol);
      actualizarAvatar(u.nombre, u.foto_url);
    } catch { toast('Error al cargar el perfil'); }
  }

  function actualizarAvatar(nombre, url) {
    const img = document.getElementById('avatar-img');
    const ini = document.getElementById('avatar-initials');
    if (url) {
      img.src = url; img.style.display = 'block'; ini.style.display = 'none';
    } else {
      img.style.display = 'none'; ini.style.display = '';
      ini.textContent = (nombre||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase() || '?';
    }
  }

  function previsualizarFoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 3*1024*1024) { toast('La imagen no debe superar 3 MB'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      fotoBase64 = ev.target.result;
      const img = document.getElementById('avatar-img');
      img.src = fotoBase64; img.style.display = 'block';
      document.getElementById('avatar-initials').style.display = 'none';
      toast('Foto seleccionada. Guarda los cambios para aplicarla.', true);
    };
    reader.readAsDataURL(file);
  }

  async function guardarPerfil() {
    const nombre = document.getElementById('p-nombre').value.trim();
    if (!nombre) { toast('El nombre es obligatorio'); return; }
    const payload = {
      nombre,
      apellido: document.getElementById('p-apellido').value.trim(),
      telefono: document.getElementById('p-telefono').value.trim(),
    };
    if (fotoBase64) payload.foto_base64 = fotoBase64;
    try {
      const res  = await apiFetch('/perfil', {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      localStorage.setItem('nombre_usuario', nombre);
      if (data.foto_url) localStorage.setItem('foto_url', data.foto_url);
      document.getElementById('nav-nombre').textContent = nombre;
      document.getElementById('av-nombre').textContent  = `${nombre} ${document.getElementById('p-apellido').value}`.trim();
      actualizarAvatar(nombre, data.foto_url);
      feedback('fb-perfil', '✓ Cambios guardados');
      toast('Perfil actualizado', true);
      fotoBase64 = null;
    } catch(err) {
      feedback('fb-perfil', err.message, false);
      toast(err.message);
    }
  }

  async function cambiarPassword() {
    const actual   = document.getElementById('pw-actual').value;
    const nueva    = document.getElementById('pw-nueva').value;
    const confirma = document.getElementById('pw-confirma').value;
    if (!actual||!nueva||!confirma) { toast('Completa todos los campos'); return; }
    if (nueva !== confirma)         { toast('Las contraseñas no coinciden'); return; }
    if (nueva.length < 6)           { toast('Mínimo 6 caracteres'); return; }
    try {
      const res  = await apiFetch('/perfil/password', {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password_actual: actual, password_nueva: nueva, password_confirma: confirma })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      ['pw-actual','pw-nueva','pw-confirma'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('strength-bar').style.width = '0';
      document.getElementById('strength-text').textContent = '';
      feedback('fb-pw', '✓ Contraseña actualizada');
      toast('Contraseña cambiada', true);
    } catch(err) {
      feedback('fb-pw', err.message, false);
      toast(err.message);
    }
  }

  function checkStrength(pw) {
    const bar = document.getElementById('strength-bar');
    const txt = document.getElementById('strength-text');
    if (!pw) { bar.style.width='0'; txt.textContent=''; return; }
    let score = 0;
    if (pw.length>=8)            score++;
    if (/[A-Z]/.test(pw))        score++;
    if (/[0-9]/.test(pw))        score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const map = [
      ['0%','#e8e4e0',''],
      ['25%','#D0342C','Muy débil'],
      ['50%','#f39c12','Débil'],
      ['75%','#3498db','Moderada'],
      ['100%','#27ae60','Fuerte ✓'],
    ];
    const [w,c,l] = map[score] || map[0];
    bar.style.width=w; bar.style.background=c; txt.textContent=l;
  }

  function togglePw(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  }

  function rolLabel(r) {
    return { admin:'Administrador', operador:'Operador', conductor:'Conductor' }[r] || r || '—';
  }

  function ejecutarLogout() {
    apiFetch('/logout', { method: 'POST' }).catch(()=>{});
    localStorage.clear();
    window.location.href = '../index.html';
  }

  cargarPerfil();

// ── INJECT LOGOUT MODAL ──
function mostrarModalLogout() {
  if (!document.getElementById('modal-logout-global')) {
    const modalHTML = `
    <style>
      #modal-logout-global { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 999999; align-items: center; justify-content: center; backdrop-filter: blur(4px); font-family: 'Inter', sans-serif; }
      #modal-logout-global.open { display: flex; animation: fadeIn 0.2s ease; }
      .ml-box { background: #fff; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; text-align: center; position: relative; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
      .ml-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.25rem; color: #64748b; cursor: pointer; transition: color 0.2s; }
      .ml-close:hover { color: #0f172a; }
      .ml-icon { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #475569; margin: 0 auto 1.5rem; }
      .ml-title { font-size: 1.25rem; font-weight: 600; color: #0f172a; margin-bottom: 0.75rem; }
      .ml-text { font-size: 0.875rem; color: #64748b; margin-bottom: 2rem; line-height: 1.5; }
      .ml-actions { display: flex; gap: 1rem; justify-content: center; }
