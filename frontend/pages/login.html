<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Ambulancias — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #D0342C;
      --red-dark: #A0251F;
      --red-light: #F5E8E7;
      --cream: #FAF8F5;
      --dark: #1A1410;
      --gray: #6B6560;
      --border: #E2DDD8;
      --white: #FFFFFF;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Panel izquierdo */
    .left-panel {
      width: 45%;
      background: var(--dark);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      top: -120px; left: -120px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: var(--red);
      opacity: 0.12;
    }

    .left-panel::after {
      content: '';
      position: absolute;
      bottom: -80px; right: -80px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: var(--red);
      opacity: 0.08;
    }

    .brand {
      position: relative; z-index: 1;
    }

    .brand-icon {
      width: 52px; height: 52px;
      background: var(--red);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
      font-size: 24px;
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.02em;
      line-height: 1.3;
    }

    .brand span {
      color: var(--red);
    }

    .hero-text {
      position: relative; z-index: 1;
    }

    .hero-text h2 {
      font-family: 'Syne', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .hero-text h2 em {
      font-style: normal;
      color: var(--red);
    }

    .hero-text p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      max-width: 280px;
    }

    .stats {
      position: relative; z-index: 1;
      display: flex; gap: 2rem;
    }

    .stat-item {}
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--white);
    }
    .stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }

    /* Grid decorativo */
    .grid-deco {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Panel derecho */
    .right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .form-container {
      width: 100%;
      max-width: 400px;
    }

    .form-header {
      margin-bottom: 2.5rem;
    }

    .form-header h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 0.4rem;
    }

    .form-header p {
      font-size: 0.88rem;
      color: var(--gray);
    }

    .tabs {
      display: flex;
      gap: 0;
      background: var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 2rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.55rem 1rem;
      border: none;
      background: transparent;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--white);
      color: var(--dark);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .field {
      margin-bottom: 1.1rem;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 0.4rem;
      letter-spacing: 0.01em;
    }

    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--dark);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(208,52,44,0.08);
    }

    .field input::placeholder { color: #C5BFB9; }

    .submit-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover { background: var(--red-dark); }
    .submit-btn:active { transform: scale(0.99); }

    .submit-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.2rem 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 0.75rem;
      color: var(--gray);
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .alert.error {
      background: var(--red-light);
      color: var(--red-dark);
      border: 1px solid rgba(208,52,44,0.2);
      display: block;
    }

    .alert.success {
      background: #E8F5E9;
      color: #2E7D32;
      border: 1px solid rgba(46,125,50,0.2);
      display: block;
    }

    .footer-note {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--gray);
    }

    /* Animación entrada */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-container {
      animation: fadeUp 0.5s ease both;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .online-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4CAF50;
      margin-right: 6px;
      animation: pulse-dot 2s infinite;
    }
  </style>
</head>
<body>

  <!-- Panel izquierdo -->
  <div class="left-panel">
    <div class="grid-deco"></div>

    <div class="brand">
      <div class="brand-icon">🚑</div>
      <h1>Sistema de<br><span>Ambulancias</span></h1>
    </div>

    <div class="hero-text">
      <h2>Cada segundo<br><em>importa.</em></h2>
      <p>Plataforma de gestión y coordinación de servicios de emergencias médicas en tiempo real.</p>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-num">24/7</div>
        <div class="stat-label">Disponibilidad</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">—</div>
        <div class="stat-label">Tiempo real</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">GPE</div>
        <div class="stat-label">Sistema</div>
      </div>
    </div>
  </div>

  <!-- Panel derecho -->
  <div class="right-panel">
    <div class="form-container">

      <div class="form-header">
        <h3>Bienvenido</h3>
        <p><span class="online-dot"></span>Sistema en línea</p>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
      </div>

      <!-- Alert -->
      <div class="alert" id="alert"></div>

      <!-- LOGIN -->
      <div class="form-section active" id="section-login">
        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" id="login-email" placeholder="operador@ambulancias.pe">
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="submit-btn" id="btn-login" onclick="handleLogin()">
          Ingresar al sistema
        </button>
      </div>

      <!-- REGISTRO -->
      <div class="form-section" id="section-register">
        <div class="field">
          <label>Nombre completo</label>
          <input type="text" id="reg-nombre" placeholder="Favio Yaranga">
        </div>
        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="operador@ambulancias.pe">
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres">
        </div>
        <button class="submit-btn" id="btn-register" onclick="handleRegister()">
          Crear cuenta
        </button>
      </div>

      <div class="footer-note">
        Sistema de gestión de ambulancias &copy; 2026
      </div>

    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:5000/api';

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('section-login').classList.toggle('active', tab === 'login');
      document.getElementById('section-register').classList.toggle('active', tab === 'register');
      hideAlert();
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + type;
    }

    function hideAlert() {
      document.getElementById('alert').className = 'alert';
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showAlert('Completa todos los campos.', 'error');

      const btn = document.getElementById('btn-login');
      btn.classList.add('loading');
      btn.textContent = 'Verificando...';

      try {
        const res = await fetch(API + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          showAlert('✓ Acceso concedido. Redirigiendo...', 'success');
          setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
        } else {
          showAlert(data.error || 'Credenciales incorrectas.', 'error');
        }
      } catch (e) {
        showAlert('No se pudo conectar al servidor.', 'error');
      }

      btn.classList.remove('loading');
      btn.textContent = 'Ingresar al sistema';
    }

    async function handleRegister() {
      const nombre = document.getElementById('reg-nombre').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      if (!nombre || !email || !password) return showAlert('Completa todos los campos.', 'error');
      if (password.length < 6) return showAlert('La contraseña debe tener al menos 6 caracteres.', 'error');

      const btn = document.getElementById('btn-register');
      btn.classList.add('loading');
      btn.textContent = 'Registrando...';

      try {
        const res = await fetch(API + '/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          showAlert('✓ Cuenta creada. Ahora puedes iniciar sesión.', 'success');
          setTimeout(() => switchTab('login'), 2000);
        } else {
          showAlert(data.error || 'Error al registrar.', 'error');
        }
      } catch (e) {
        showAlert('No se pudo conectar al servidor.', 'error');
      }

      btn.classList.remove('loading');
      btn.textContent = 'Crear cuenta';
    }

    // Enter para enviar
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const loginActive = document.getElementById('section-login').classList.contains('active');
        loginActive ? handleLogin() : handleRegister();
      }
    });
  </script>
</body>
</html>
